name: Spell Check

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  spell-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
    - name: Spell Check
      uses: crate-ci/typos@02ea592e44b3a53c302f697cddca7641cd051c3d # v1.45.0
      with: 
        config: _typos.toml
